scrHome As screen:
    Fill: =RGBA(31, 55, 100, 1)

    rectNavyBackground As rectangle:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =Parent.Height
        Fill: =RGBA(31, 55, 100, 1)

    imgBALogo As image:
        X: =24
        Y: =20
        Width: =80
        Height: =40
        Image: =BALogo
        ImagePosition: =ImagePosition.Fit

    lblAppTitle As label:
        X: =0
        Y: =100
        Width: =Parent.Width
        Height: =40
        Text: ="Change Request Management"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Bold
        Size: =20
        Align: =Align.Center

    lblSubtitle As label:
        X: =0
        Y: =145
        Width: =Parent.Width
        Height: =28
        Text: ="British Airways Cabin Programme"
        Color: =RGBA(174, 214, 241, 1)
        Font: =Font.'Segoe UI'
        Size: =13
        Align: =Align.Center

    btnViewCRs As button:
        X: =(Parent.Width - 500) / 2
        Y: =210
        Width: =500
        Height: =52
        Text: ="View Change Requests"
        Fill: =RGBA(110, 140, 176, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =15
        FontWeight: =FontWeight.Semibold
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: =Navigate(scrViewCRs, None)

    btnSubmitCR As button:
        X: =(Parent.Width - 500) / 2
        Y: =278
        Width: =500
        Height: =52
        Text: ="Submit New Change Request"
        Fill: =RGBA(192, 57, 43, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =15
        FontWeight: =FontWeight.Semibold
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: |
            =Set(gblCRMode, "New");
            Set(gblDetailCR, Defaults(CRRequests));
            Navigate(scrSubmitCR, None)

    btnTemplates As button:
        X: =(Parent.Width - 500) / 2
        Y: =346
        Width: =500
        Height: =52
        Text: ="CR Templates & Docs"
        Fill: =RGBA(39, 174, 96, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =15
        FontWeight: =FontWeight.Semibold
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: =Launch("https://[tenant].sharepoint.com/sites/BA-CR-Tool/CR-Templates")

    btnDashboard As button:
        X: =(Parent.Width - 500) / 2
        Y: =414
        Width: =500
        Height: =52
        Text: ="Dashboard"
        Fill: =RGBA(243, 156, 18, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =15
        FontWeight: =FontWeight.Semibold
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: =Navigate(scrDashboard, None)

    btnUserAdmin As button:
        X: =(Parent.Width - 500) / 2
        Y: =482
        Width: =500
        Height: =52
        Text: ="User Admin"
        Fill: =RGBA(149, 165, 166, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =15
        FontWeight: =FontWeight.Semibold
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsAdmin
        OnSelect: =Navigate(scrUserAdmin, None)

    rectRoleBadge As rectangle:
        X: =16
        Y: =Parent.Height - 44
        Width: =80
        Height: =28
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        Fill: =Switch(gblCurrentUserRole, "Admin", RGBA(192,57,43,1), "PMO", RGBA(31,55,100,1), "Programme Manager", RGBA(31,55,100,1), RGBA(39,174,96,1))

    lblRoleBadge As label:
        X: =16
        Y: =Parent.Height - 44
        Width: =80
        Height: =28
        Text: =gblCurrentUserRole
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =10
        Align: =Align.Center
        FontWeight: =FontWeight.Semibold

    lblVersion As label:
        X: =Parent.Width - 60
        Y: =Parent.Height - 28
        Width: =50
        Height: =20
        Text: ="v1.0"
        Color: =RGBA(255, 255, 255, 0.5)
        Font: =Font.'Segoe UI'
        Size: =10
        Align: =Align.Right
