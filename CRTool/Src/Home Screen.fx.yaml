"'Home Screen' As screen":
    Fill: =RGBA(1, 37, 84, 1)
    OnVisible: |
        =/*
          Home Screen — OnVisible
          Purpose: Reset transient state on return to home; no data calls needed.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        Set(gblFormError, "");
        Set(gblDetailCR, Blank());
        Set(gblConsolidationCR, Blank())

    conMainHS As groupContainer:
        Height: =Parent.Height
        Width: =Parent.Width

        recBgHS As rectangle:
            Fill: =RGBA(1, 37, 84, 1)
            Height: =Parent.Height
            Width: =Parent.Width
            X: =0
            Y: =0

        recGoldAccentHS As rectangle:
            Fill: =RGBA(186, 150, 46, 1)
            Height: =4
            Width: =Parent.Width
            X: =0
            Y: =0

        imgLogoHS As image:
            Height: =40
            Image: =""
            ImagePosition: =ImagePosition.Fit
            Width: =80
            X: =24
            Y: =16

        lblTitleHS As label:
            Align: =Align.Center
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =44
            Size: =22
            Text: ="Change Request Management"
            Width: =Parent.Width
            X: =0
            Y: =88

        lblSubtitleHS As label:
            Align: =Align.Center
            Color: =RGBA(186, 150, 46, 1)
            Font: =Font.'Segoe UI'
            Height: =24
            Text: ="British Airways Engineering Programmes"
            Width: =Parent.Width
            X: =0
            Y: =lblTitleHS.Y + lblTitleHS.Height + 4

        recDividerHS As rectangle:
            Fill: =RGBA(186, 150, 46, 0.4)
            Height: =1
            Width: =120
            X: =(Parent.Width - 120) / 2
            Y: =lblSubtitleHS.Y + lblSubtitleHS.Height + 12

        btnViewCRsHS As button:
            BorderThickness: =0
            Fill: =RGBA(0, 75, 135, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            OnSelect: =Navigate('View CRs Screen', ScreenTransition.None)
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Text: ="View Change Requests"
            Width: =500
            X: =(Parent.Width - 1010) / 2
            Y: =recDividerHS.Y + recDividerHS.Height + 28

        btnSubmitCRHS As button:
            BorderThickness: =0
            Fill: =RGBA(186, 150, 46, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            OnSelect: |
                =Set(gblCRMode, "New");
                Set(gblDetailCR, Defaults(CRRequests));
                Navigate('Submit CR Screen', ScreenTransition.None)
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Text: ="Submit New Change Request"
            Width: =500
            X: =btnViewCRsHS.X + btnViewCRsHS.Width + 10
            Y: =btnViewCRsHS.Y

        btnTemplatesHS As button:
            BorderThickness: =0
            Fill: =RGBA(0, 75, 135, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            OnSelect: |-
                =Launch("https://[tenant].sharepoint.com/sites/BA-CR-Tool/CR-Templates")
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Text: ="CR Templates & Docs"
            Width: =500
            X: =btnViewCRsHS.X
            Y: =btnViewCRsHS.Y + btnViewCRsHS.Height + 12

        btnDashboardHS As button:
            BorderThickness: =0
            Fill: =RGBA(186, 150, 46, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            OnSelect: =Navigate('Dashboard Screen', ScreenTransition.None)
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Text: ="Dashboard"
            Width: =500
            X: =btnSubmitCRHS.X
            Y: =btnTemplatesHS.Y

        btnPMOConsHS As button:
            BorderThickness: =0
            Fill: =RGBA(0, 75, 135, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            OnSelect: =Navigate('PMO Consolidation Screen', ScreenTransition.None)
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Text: ="PMO Consolidation"
            Visible: =gblIsPMO
            Width: =500
            X: =btnViewCRsHS.X
            Y: =btnTemplatesHS.Y + btnTemplatesHS.Height + 12

        btnProgMeetHS As button:
            BorderThickness: =0
            Fill: =RGBA(0, 75, 135, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            OnSelect: =Navigate('Programme Meeting Screen', ScreenTransition.None)
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Text: ="Programme Meeting"
            Visible: =gblIsPMO
            Width: =500
            X: =btnSubmitCRHS.X
            Y: =btnPMOConsHS.Y

        btnUserAdminHS As button:
            BorderColor: =RGBA(186, 150, 46, 0.5)
            BorderThickness: =1
            Color: =RGBA(186, 150, 46, 1)
            Fill: =RGBA(0, 75, 135, 1)
            Font: =Font.'Segoe UI'
            Height: =54
            OnSelect: =Navigate('User Admin Screen', ScreenTransition.None)
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Text: ="User Administration"
            Width: =1010
            X: =btnViewCRsHS.X
            Y: =btnPMOConsHS.Y + btnPMOConsHS.Height + 12

        recRoleBadgeHS As rectangle:
            Fill: =Switch(gblCurrentUserRole, "Admin", RGBA(192,57,43,1), "PMO", RGBA(0,75,135,1), "Programme Manager", RGBA(0,75,135,1), RGBA(0,120,100,1))
            Height: =28
            RadiusBottomLeft: =14
            RadiusBottomRight: =14
            RadiusTopLeft: =14
            RadiusTopRight: =14
            Width: =130
            X: =16
            Y: =Parent.Height - 44

        lblRoleBadgeHS As label:
            Align: =Align.Center
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =recRoleBadgeHS.Height
            Size: =10
            Text: =gblCurrentUserRole
            Width: =recRoleBadgeHS.Width
            X: =recRoleBadgeHS.X
            Y: =recRoleBadgeHS.Y

        lblVersionHS As label:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 0.35)
            Font: =Font.'Segoe UI'
            Height: =20
            Size: =10
            Text: ="v1.0"
            Width: =50
            X: =Parent.Width - 60
            Y: =Parent.Height - 32

