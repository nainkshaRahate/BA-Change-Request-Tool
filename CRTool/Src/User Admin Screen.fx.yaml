"'User Admin Screen' As screen":
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          User Admin Screen — OnVisible
          Purpose: User role and group management. Restricted to Admin role only.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        // Guard: redirect non-admin users immediately.
        If(Not(gblIsAdmin), Navigate('Home Screen', ScreenTransition.None))

    conMainUAS As groupContainer:
        Fill: =RGBA(245, 247, 250, 1)
        Height: =Parent.Height
        Width: =Parent.Width

        conHeaderUAS As groupContainer:
            Height: =50
            Width: =Parent.Width

            recHeaderUAS As rectangle:
                Fill: =RGBA(1, 37, 84, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            recGoldAccentUAS As rectangle:
                Fill: =RGBA(186, 150, 46, 1)
                Height: =3
                Width: =Parent.Width
                X: =0
                Y: =47

            imgLogoUAS As image:
                Height: =20
                Image: =""
                ImagePosition: =ImagePosition.Fit
                Width: =40
                X: =8
                Y: =15

            lblHeaderUAS As label:
                Align: =Align.Center
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Semibold
                Height: =Parent.Height
                Size: =16
                Text: ="User Administration"
                Width: =Parent.Width
                X: =0
                Y: =0

        conSubNavUAS As groupContainer:
            Height: =45
            Width: =Parent.Width
            Y: =conHeaderUAS.Y + conHeaderUAS.Height

            recSubNavUAS As rectangle:
                Fill: =RGBA(0, 22, 55, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            btnHomeUAS As button:
                BorderThickness: =0
                Fill: =RGBA(0, 22, 55, 1)
                Height: =36
                OnSelect: =Navigate('Home Screen', ScreenTransition.None)
                Size: =16
                Text: ="🏠"
                Width: =36
                X: =8
                Y: =4

        txtSearchUAS As text:
            BorderColor: =RGBA(180, 196, 218, 1)
            BorderThickness: =1
            Font: =Font.'Segoe UI'
            Height: =34
            HintText: ="Search by name..."
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            RadiusTopLeft: =6
            RadiusTopRight: =6
            Width: =400
            X: =16
            Y: =conSubNavUAS.Y + conSubNavUAS.Height + 8

        recColHeaderBgUAS As rectangle:
            Fill: =RGBA(0, 22, 55, 1)
            Height: =32
            Width: =Parent.Width
            X: =0
            Y: =txtSearchUAS.Y + txtSearchUAS.Height + 4

        lblColNameUAS As label:
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =32
            PaddingLeft: =16
            Size: =11
            Text: ="Name"
            Width: =280
            X: =0
            Y: =recColHeaderBgUAS.Y

        lblColRoleUAS As label:
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =32
            Size: =11
            Text: ="Role"
            Width: =170
            X: =300
            Y: =recColHeaderBgUAS.Y

        lblColGroupUAS As label:
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =32
            Size: =11
            Text: ="Stakeholder Group"
            Width: =240
            X: =478
            Y: =recColHeaderBgUAS.Y

        lblColActiveUAS As label:
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =32
            Size: =11
            Text: ="Active"
            Width: =100
            X: =726
            Y: =recColHeaderBgUAS.Y

        galUsersUAS As gallery:
            Height: =Parent.Height - Self.Y
            Items: =Filter(CRUserAdmin, IsBlank(txtSearchUAS.Text) Or txtSearchUAS.Text in Title)
            ShowScrollbar: =true
            TemplateHeight: =60
            TemplatePadding: =0
            Width: =Parent.Width
            X: =0
            Y: =recColHeaderBgUAS.Y + recColHeaderBgUAS.Height

            recRowBgUAS As rectangle:
                Fill: =If(IsEven(ThisItem.ID), RGBA(249, 249, 249, 1), RGBA(255, 255, 255, 1))
                Height: =59
                Width: =Parent.Width
                X: =0
                Y: =0

            recRowBorderUAS As rectangle:
                Fill: =RGBA(224, 224, 224, 1)
                Height: =1
                Width: =Parent.Width
                X: =0
                Y: =59

            lblUserNameUAS As label:
                Color: =RGBA(33, 33, 33, 1)
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Semibold
                Height: =36
                Text: =ThisItem.Title
                Width: =280
                X: =16
                Y: =12

            ddlRoleUAS As dropdown:
                BorderColor: =RGBA(180, 196, 218, 1)
                Default: =ThisItem.Role.Value
                Font: =Font.'Segoe UI'
                Height: =36
                Items: =["Admin","PMO","Programme Manager","Stakeholder"]
                Size: =11
                Width: =160
                X: =300
                Y: =12

            ddlGroupUAS As dropdown:
                BorderColor: =RGBA(180, 196, 218, 1)
                Default: =ThisItem.StakeholderGroup.Value
                Font: =Font.'Segoe UI'
                Height: =36
                Items: =["","Engineering Programmes","Engineering Technical","Onboard Experience","Finance","Procurement","Other"]
                Size: =11
                Width: =234
                X: =468
                Y: =12

            tglActiveUAS As toggleSwitch:
                Default: =ThisItem.IsActive
                Font: =Font.'Segoe UI'
                Height: =36
                OffText: ="No"
                OnText: ="Yes"
                Size: =10
                Width: =88
                X: =710
                Y: =12

            btnSaveUAS As button:
                BorderThickness: =0
                Fill: =RGBA(1, 37, 84, 1)
                Font: =Font.'Segoe UI'
                Height: =36
                OnSelect: |
                    =Patch(CRUserAdmin, ThisItem, {
                      Role: {Value: ddlRoleUAS.Selected.Value},
                      StakeholderGroup: {Value: ddlGroupUAS.Selected.Value},
                      IsActive: tglActiveUAS.Value
                    });
                    If(IsEmpty(Errors(CRUserAdmin)),
                      Notify("User updated successfully.", NotificationType.Success),
                      Notify("Save failed — " & First(Errors(CRUserAdmin)).Message, NotificationType.Error)
                    )
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =12
                Text: ="Save"
                Width: =90
                X: =Parent.Width - 106
                Y: =12

