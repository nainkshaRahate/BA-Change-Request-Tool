'Dashboard Screen' As screen:
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          Dashboard Screen — OnVisible
          Purpose: Load aggregated programme-level CR statistics for the dashboard tiles.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        // Use Concurrent for any future additional data calls added to this screen.
        Concurrent(
          ClearCollect(colProgrammeStats,
            AddColumns(
              GroupBy(Filter(CRRequests, Not(IsBlank(ProgrammeName))), "ProgrammeName", "CRItems"),
              "Open",         CountIf(CRItems, Not(CRStatus.Value In ["Closed","Rejected","Approved"])),
              "InAssessment", CountIf(CRItems, CRStatus.Value = "In Assessment"),
              "SGReady",      CountIf(CRItems, CRStatus.Value In ["Pre-SG Distribution","SG Review"]),
              "Approved",     CountIf(CRItems, CRStatus.Value = "Approved"),
              "Rejected",     CountIf(CRItems, CRStatus.Value = "Rejected")
            )
          )
        )

    conMainDS As GroupContainer:
        Fill: =RGBA(0, 0, 0, 0)
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =Parent.Height

        conHeaderDS As GroupContainer:
            Fill: =RGBA(0, 0, 0, 0)
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =50

            recHeaderDS As rectangle:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Fill: =RGBA(31, 55, 100, 1)

            imgLogoDS As image:
                X: =8
                Y: =15
                Width: =40
                Height: =20
                Image: =""
                ImagePosition: =ImagePosition.Fit

            lblHeaderDS As label:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Text: ="CR Dashboard"
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                Size: =16
                FontWeight: =FontWeight.Semibold
                Align: =Align.Center

        conSubNavDS As GroupContainer:
            Fill: =RGBA(0, 0, 0, 0)
            X: =0
            Y: =conHeaderDS.Y + conHeaderDS.Height
            Width: =Parent.Width
