"'Dashboard Screen' As screen":
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          Dashboard Screen — OnVisible
          Purpose: Load aggregated programme-level CR statistics for the dashboard tiles.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        // Use Concurrent for any future additional data calls added to this screen.
        Concurrent(
          ClearCollect(colProgrammeStats,
            AddColumns(
              GroupBy(Filter(CRRequests, Not(IsBlank(ProgrammeName))), "ProgrammeName", "CRItems"),
              "Open",         CountIf(CRItems, CRStatus.Value <> "Closed" && CRStatus.Value <> "Rejected" && CRStatus.Value <> "Approved"),
              "InAssessment", CountIf(CRItems, CRStatus.Value = "In Assessment"),
              "SGReady",      CountIf(CRItems, CRStatus.Value = "Pre-SG Distribution" || CRStatus.Value = "SG Review"),
              "Approved",     CountIf(CRItems, CRStatus.Value = "Approved"),
              "Rejected",     CountIf(CRItems, CRStatus.Value = "Rejected")
            )
          ),
          // Build RAG summary collection for active CRs (not Closed/Approved/Rejected)
          // Each row gets amber/red/paleblue/green counts from CRStakeholderReviews for that CR
          ClearCollect(colActiveCRsWithRAG,
            AddColumns(
              Filter(CRRequests, CRStatus.Value <> "Closed" && CRStatus.Value <> "Approved" && CRStatus.Value <> "Rejected"),
              "AmberCount",    CountRows(Filter(CRStakeholderReviews, CRNumber = ThisRecord.CRNumber, RAGStatus.Value = "Amber")),
              "RedCount",      CountRows(Filter(CRStakeholderReviews, CRNumber = ThisRecord.CRNumber, RAGStatus.Value = "Red")),
              "PaleBlueCount", CountRows(Filter(CRStakeholderReviews, CRNumber = ThisRecord.CRNumber, RAGStatus.Value = "Pale Blue")),
              "GreenCount",    CountRows(Filter(CRStakeholderReviews, CRNumber = ThisRecord.CRNumber, RAGStatus.Value = "Green")),
              "TotalReviews",  CountRows(Filter(CRStakeholderReviews, CRNumber = ThisRecord.CRNumber))
            )
          )
        )

