scrSubmitCR As screen:
    Fill: =RGBA(245, 247, 250, 1)

    rectHeaderSubmit As rectangle:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Fill: =RGBA(31, 55, 100, 1)

    imgLogoSubmit As image:
        X: =8
        Y: =5
        Width: =40
        Height: =20
        Image: =BALogo
        ImagePosition: =ImagePosition.Fit

    lblHeaderSubmit As label:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Text: =If(gblCRMode = "New", "Submit New Change Request", "Edit Change Request")
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =16
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    rectSubNavSubmit As rectangle:
        X: =0
        Y: =50
        Width: =Parent.Width
        Height: =45
        Fill: =RGBA(24, 44, 82, 1)

    btnHomeSubmit As button:
        X: =8
        Y: =57
        Width: =36
        Height: =36
        Text: ="🏠"
        Fill: =RGBA(24, 44, 82, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =16
        OnSelect: =Navigate(scrHome, None)

    btnCancelSubmit As button:
        X: =50
        Y: =57
        Width: =36
        Height: =36
        Text: ="✕"
        Fill: =RGBA(24, 44, 82, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =16
        OnSelect: =Navigate(scrViewCRs, None)

    btnSaveDraft As button:
        X: =Parent.Width - 282
        Y: =58
        Width: =120
        Height: =34
        Text: ="Save as Draft"
        Fill: =RGBA(149, 165, 166, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =13
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: |
            =Patch(CRRequests,
              If(gblCRMode = "New", Defaults(CRRequests), gblDetailCR),
              {
                Title: Upper(txtProgrammeCode.Text) & ": " & txtCRNumber.Text & " - " & Upper(txtCRTitle.Text),
                CRNumber: txtCRNumber.Text,
                ProgrammeCode: Upper(txtProgrammeCode.Text),
                ProgrammeName: txtProgrammeName.Text,
                CRTitle: Upper(txtCRTitle.Text),
                Supplier: txtSupplier.Text,
                SupplierReference: txtSupplierRef.Text,
                CRDescription: taCRDescription.Text,
                ReasonForChange: taReason.Text,
                DoNothingOption: taDoNothing.Text,
                AdditionalInformation: taAdditional.Text,
                RE_Delta_PerAircraft: txtRE.Text,
                NRE_Delta: txtNRE.Text,
                TotalCostDelta: txtTotal.Text,
                WeightDelta_PerAircraft: txtW1.Text,
                WeightDelta_AllAircraft: txtWAll.Text,
                AnnualCoWImpact: txtCoW.Text,
                IsDraft: true,
                CRStatus: "Draft",
                Originator: {Claims: "i:0#.f|membership|" & User().Email, DisplayName: User().FullName}
              }
            );
            Navigate(scrViewCRs, None);
            Notify("Draft saved.", NotificationType.Success)

    btnSubmitFormally As button:
        X: =Parent.Width - 154
        Y: =58
        Width: =140
        Height: =34
        Text: ="Submit Formally"
        Fill: =RGBA(192, 57, 43, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =13
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: |
            =If(
              IsBlank(txtCRNumber.Text) Or Len(txtCRNumber.Text) < 4 Or Left(txtCRNumber.Text, 2) <> "CR" Or
              IsBlank(txtProgrammeCode.Text) Or IsBlank(txtProgrammeName.Text) Or IsBlank(txtCRTitle.Text) Or
              IsBlank(cmbProjectManager.Selected) Or IsBlank(cmbSponsor.Selected) Or
              IsBlank(ddlAIPSG.Selected) Or IsBlank(taCRDescription.Text),
              Set(gblFormError, "Please complete all required fields marked *"),
              If(CountRows(Filter(CRRequests, CRNumber = txtCRNumber.Text And ID <> gblDetailCR.ID)) > 0,
                Set(gblFormError, txtCRNumber.Text & " already exists — check the CR number"),
                Patch(CRRequests, If(gblCRMode = "New", Defaults(CRRequests), gblDetailCR), {
                  Title: Upper(txtProgrammeCode.Text) & ": " & txtCRNumber.Text & " - " & Upper(txtCRTitle.Text),
                  CRNumber: txtCRNumber.Text,
                  ProgrammeCode: Upper(txtProgrammeCode.Text),
                  ProgrammeName: txtProgrammeName.Text,
                  CRTitle: Upper(txtCRTitle.Text),
                  Supplier: txtSupplier.Text,
                  SupplierReference: txtSupplierRef.Text,
                  ProjectManager: cmbProjectManager.Selected,
                  CRSponsor: cmbSponsor.Selected,
                  AIPSGTargetDate: ddlAIPSG.Selected.MeetingDate,
                  SubmissionDeadline: ddlAIPSG.Selected.SubmissionDeadline,
                  CRDescription: taCRDescription.Text,
                  ReasonForChange: taReason.Text,
                  DoNothingOption: taDoNothing.Text,
                  AdditionalInformation: taAdditional.Text,
                  RE_Delta_PerAircraft: txtRE.Text,
                  NRE_Delta: txtNRE.Text,
                  TotalCostDelta: txtTotal.Text,
                  WeightDelta_PerAircraft: txtW1.Text,
                  WeightDelta_AllAircraft: txtWAll.Text,
                  AnnualCoWImpact: txtCoW.Text,
                  CostCurrency: ddlCurrency.Selected.Value,
                  IsConfidential: ddlConfidentiality.Selected.Value = "Confidential",
                  IsDraft: false,
                  CRStatus: "Submitted",
                  Originator: {Claims: "i:0#.f|membership|" & User().Email, DisplayName: User().FullName},
                  SubmittedDate: Today()
                });
                Navigate(scrViewCRs, None);
                Notify(txtCRNumber.Text & " submitted successfully.", NotificationType.Success)
              )
            )

    lblFormError As label:
        X: =16
        Y: =100
        Width: =Parent.Width - 32
        Height: =If(IsBlank(gblFormError), 0, 30)
        Text: =gblFormError
        Color: =RGBA(231, 76, 60, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        Visible: =Not(IsBlank(gblFormError))

