scrCRDetail As screen:
    Fill: =RGBA(245, 247, 250, 1)

    rectHeaderDetail As rectangle:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Fill: =RGBA(31, 55, 100, 1)

    imgLogoDetail As image:
        X: =8
        Y: =5
        Width: =40
        Height: =20
        Image: =BALogo
        ImagePosition: =ImagePosition.Fit

    lblHeaderDetail As label:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Text: ="CR Detail"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =16
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    rectSubNavDetail As rectangle:
        X: =0
        Y: =50
        Width: =Parent.Width
        Height: =45
        Fill: =RGBA(24, 44, 82, 1)

    btnHomeDetail As button:
        X: =8
        Y: =57
        Width: =36
        Height: =36
        Text: ="🏠"
        Fill: =RGBA(24, 44, 82, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =16
        OnSelect: =Navigate(scrHome, None)

    btnBackDetail As button:
        X: =50
        Y: =57
        Width: =36
        Height: =36
        Text: ="← Back"
        Fill: =RGBA(24, 44, 82, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =12
        OnSelect: =Navigate(scrViewCRs, None)

    btnPartB As button:
        X: =Parent.Width - 390
        Y: =58
        Width: =100
        Height: =34
        Text: ="Part B →"
        Fill: =RGBA(31, 55, 100, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: =Navigate(scrStakeholderAssessment, None)

    rectDetailStatusPill As rectangle:
        X: =Parent.Width - 280
        Y: =61
        Width: =90
        Height: =28
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        Fill: |
            =Switch(gblDetailCR.CRStatus,
              "Draft", RGBA(149,165,166,1),
              "Submitted", RGBA(110,140,176,1),
              "PMO Review", RGBA(31,55,100,1),
              "In Assessment", RGBA(243,156,18,1),
              "PMO Consolidation", RGBA(243,156,18,1),
              "Programme Meeting", RGBA(31,55,100,1),
              "Pre-SG Distribution", RGBA(31,55,100,1),
              "SG Review", RGBA(31,55,100,1),
              "Post-Meeting Edits", RGBA(243,156,18,1),
              "Approved", RGBA(39,174,96,1),
              "Deferred", RGBA(149,165,166,1),
              "Rejected", RGBA(192,57,43,1),
              "Closed", RGBA(149,165,166,1),
              RGBA(31,55,100,1)
            )

    lblDetailStatusPill As label:
        X: =Parent.Width - 280
        Y: =61
        Width: =90
        Height: =28
        Text: =gblDetailCR.CRStatus
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =10
        Align: =Align.Center
        FontWeight: =FontWeight.Semibold

    rectDaysOpenDetail As rectangle:
        X: =Parent.Width - 182
        Y: =61
        Width: =70
        Height: =28
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        Fill: =RGBA(39, 174, 96, 1)

    lblDaysOpenDetail As label:
        X: =Parent.Width - 182
        Y: =61
        Width: =70
        Height: =28
        Text: =Text(DateDiff(gblDetailCR.SubmittedDate, Today(), Days)) & " Days"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =11
        Align: =Align.Center

    btnDeleteCR As button:
        X: =Parent.Width - 104
        Y: =61
        Width: =36
        Height: =28
        Text: ="🗑"
        Fill: =RGBA(192, 57, 43, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =14
        Visible: =gblIsAdmin
        OnSelect: |
            =If(Confirm("Delete this CR? This cannot be undone."),
              Remove(CRRequests, gblDetailCR);
              Navigate(scrViewCRs, None);
              Notify("CR deleted.", NotificationType.Warning)
            )

    btnAcceptDistribute As button:
        X: =Parent.Width - 340
        Y: =58
        Width: =150
        Height: =34
        Text: ="✓ Accept & Distribute"
        Fill: =RGBA(39, 174, 96, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus = "PMO Review"
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: "In Assessment"});
            Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
            Notify(gblDetailCR.CRNumber & " accepted and distributed for assessment.", NotificationType.Success)

    btnReturnToOwner As button:
        X: =Parent.Width - 490
        Y: =58
        Width: =140
        Height: =34
        Text: ="↩ Return to Owner"
        Fill: =RGBA(149, 165, 166, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus = "PMO Review"
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: "Submitted"});
            Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
            Notify(gblDetailCR.CRNumber & " returned to owner.", NotificationType.Warning)

    btnMarkReadyForSG As button:
        X: =Parent.Width - 490
        Y: =58
        Width: =150
        Height: =34
        Text: ="Mark Ready for SG"
        Fill: =RGBA(31, 55, 100, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus = "PMO Consolidation"
        OnSelect: |
            =If(CountRows(Filter(CRStakeholderReviews,
                CRNumber.CRNumber = gblDetailCR.CRNumber, RAGStatus = "Pale Blue")) > 0,
              Notify("Cannot proceed — " &
                Text(CountRows(Filter(CRStakeholderReviews, CRNumber.CRNumber = gblDetailCR.CRNumber, RAGStatus = "Pale Blue"))) &
                " stakeholder group(s) are still Pale Blue. All assessments must be complete before SG distribution.",
                NotificationType.Error),
              Patch(CRRequests, gblDetailCR, {CRStatus: "Pre-SG Distribution"});
              Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
              Notify("CR marked ready for Pre-SG Distribution.", NotificationType.Success)
            )

    btnRecordSGDecision As button:
        X: =Parent.Width - 400
        Y: =58
        Width: =160
        Height: =34
        Text: ="Record SG Decision"
        Fill: =RGBA(243, 156, 18, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus = "SG Review"
        OnSelect: =Notify("Use the SG Decision panel below to record the outcome.", NotificationType.Information)

    btnCloseCR As button:
        X: =Parent.Width - 340
        Y: =58
        Width: =100
        Height: =34
        Text: ="Close CR"
        Fill: =RGBA(149, 165, 166, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus = "Approved"
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: "Closed", ClosedDate: Today()});
            Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
            Notify(gblDetailCR.CRNumber & " closed.", NotificationType.Success)

