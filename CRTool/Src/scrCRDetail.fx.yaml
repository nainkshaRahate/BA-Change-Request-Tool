    galRAGBar As gallery:
        X: =135
        Y: =596
        Width: =Parent.Width - 135
        Height: =56
        TemplateWidth: =160
        TemplatePadding: =8
        Layout: =Layout.Horizontal
        Items: =Filter(CRStakeholderReviews, CRNumber.CRNumber = gblDetailCR.CRNumber)

        lblRAGGroup As label:
            X: =0
            Y: =0
            Width: =120
            Height: =28
            Text: =ThisItem.StakeholderGroup
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Size: =10
            FontWeight: =FontWeight.Semibold

        rectRAGColor As rectangle:
            X: =120
            Y: =4
            Width: =30
            Height: =28
            RadiusTopLeft: =4
            RadiusTopRight: =4
            RadiusBottomLeft: =4
            RadiusBottomRight: =4
            Fill: |
                =Switch(ThisItem.RAGStatus,
                  "Green", RGBA(39,174,96,1),
                  "Amber", RGBA(243,156,18,1),
                  "Red", RGBA(192,57,43,1),
                  "Grey", RGBA(149,165,166,1),
                  RGBA(174,214,241,1)
                )
