scrDashboard As screen:
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =ClearCollect(colProgrammeStats,
          AddColumns(
            GroupBy(Filter(CRRequests, Not(IsBlank(ProgrammeName))), "ProgrammeName", "CRItems"),
            "Open", CountIf(CRItems, Not(CRStatus In ["Closed","Rejected","Approved"])),
            "InAssessment", CountIf(CRItems, CRStatus = "In Assessment"),
            "SGReady", CountIf(CRItems, CRStatus In ["Pre-SG Distribution","SG Review"]),
            "Approved", CountIf(CRItems, CRStatus = "Approved"),
            "Rejected", CountIf(CRItems, CRStatus = "Rejected")
          )
        )

