scrUserAdmin As screen:
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: =If(Not(gblIsAdmin), Navigate(scrHome, None))

    rectHeaderUA As rectangle:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Fill: =RGBA(31, 55, 100, 1)

    imgLogoUA As image:
        X: =8
        Y: =5
        Width: =40
        Height: =20
        Image: =BALogo
        ImagePosition: =ImagePosition.Fit

    lblHeaderUA As label:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Text: ="User Administration"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =16
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    rectSubNavUA As rectangle:
        X: =0
        Y: =50
        Width: =Parent.Width
        Height: =45
        Fill: =RGBA(24, 44, 82, 1)

    btnHomeUA As button:
        X: =8
        Y: =57
        Width: =36
        Height: =36
        Text: ="🏠"
        Fill: =RGBA(24, 44, 82, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =16
        OnSelect: =Navigate(scrHome, None)

    txtUserSearch As text:
        X: =16
        Y: =103
        Width: =400
        Height: =34
        HintText: ="Search by name..."
        Font: =Font.'Segoe UI'
        Size: =13
        BorderColor: =RGBA(200, 200, 200, 1)
        BorderThickness: =1
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4

    galUserAdmin As gallery:
        X: =0
        Y: =148
        Width: =Parent.Width
        Height: =Parent.Height - 148
        TemplateHeight: =60
        TemplatePadding: =0
        Items: =Filter(CRUserAdmin, IsBlank(txtUserSearch.Text) Or txtUserSearch.Text in Title)

        rectUserRowBg As rectangle:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =59
            Fill: =If(IsEven(ThisItem.ID), RGBA(249, 249, 249, 1), RGBA(255, 255, 255, 1))

        rectUserRowBorder As rectangle:
            X: =0
            Y: =58
            Width: =Parent.Width
            Height: =1
            Fill: =RGBA(224, 224, 224, 1)

        lblUserName As label:
            X: =16
            Y: =8
            Width: =200
            Height: =44
            Text: =ThisItem.Title
            Color: =RGBA(33, 33, 33, 1)
            Font: =Font.'Segoe UI'
            Size: =13
            FontWeight: =FontWeight.Bold

        lblUserTeam As label:
            X: =224
            Y: =8
            Width: =150
            Height: =44
            Text: =If(IsBlank(ThisItem.Team), "—", ThisItem.Team)
            Color: =RGBA(117, 117, 117, 1)
            Font: =Font.'Segoe UI'
            Size: =12

        rectRoleBadgeUA As rectangle:
            X: =382
            Y: =14
            Width: =80
            Height: =24
            RadiusTopLeft: =4
            RadiusTopRight: =4
            RadiusBottomLeft: =4
            RadiusBottomRight: =4
            Fill: |
                =Switch(ThisItem.Role,
                  "Admin", RGBA(192,57,43,1),
                  "PMO", RGBA(31,55,100,1),
                  "Programme Manager", RGBA(31,55,100,1),
                  RGBA(39,174,96,1)
                )

        lblRoleBadgeUA As label:
            X: =382
            Y: =14
            Width: =80
            Height: =24
            Text: =ThisItem.Role
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Size: =9
            Align: =Align.Center
            FontWeight: =FontWeight.Semibold

        rectGroupBadge As rectangle:
            X: =470
            Y: =14
            Width: =140
            Height: =24
            RadiusTopLeft: =4
            RadiusTopRight: =4
            RadiusBottomLeft: =4
            RadiusBottomRight: =4
            Fill: =RGBA(149, 165, 166, 1)
            Visible: =Not(IsBlank(ThisItem.StakeholderGroup))

        lblGroupBadge As label:
            X: =470
            Y: =14
            Width: =140
            Height: =24
            Text: =ThisItem.StakeholderGroup
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Size: =9
            Align: =Align.Center
            Visible: =Not(IsBlank(ThisItem.StakeholderGroup))

        lblEditRole As label:
            X: =630
            Y: =8
            Width: =80
            Height: =20
            Text: ="Role:"
            Color: =RGBA(33, 33, 33, 1)
            Font: =Font.'Segoe UI'
            Size: =11

        ddlEditRole As dropdown:
            X: =630
            Y: =28
            Width: =160
            Height: =28
            Items: =["Admin","PMO","Programme Manager","Stakeholder"]
            Default: =ThisItem.Role
            Font: =Font.'Segoe UI'
            Size: =11
            BorderColor: =RGBA(200, 200, 200, 1)

        lblEditGroup As label:
            X: =800
            Y: =8
            Width: =120
            Height: =20
            Text: ="Stakeholder Group:"
            Color: =RGBA(33, 33, 33, 1)
            Font: =Font.'Segoe UI'
            Size: =11

        ddlEditGroup As dropdown:
            X: =800
            Y: =28
            Width: =200
            Height: =28
            Items: =["","Engineering Programmes","Engineering Technical","Onboard Experience","Finance","Procurement","Other"]
            Default: =ThisItem.StakeholderGroup
            Font: =Font.'Segoe UI'
            Size: =11
            BorderColor: =RGBA(200, 200, 200, 1)

        lblActiveLabel As label:
            X: =1010
            Y: =8
            Width: =60
            Height: =20
            Text: ="Active:"
            Color: =RGBA(33, 33, 33, 1)
            Font: =Font.'Segoe UI'
            Size: =11

        togActive As toggle:
            X: =1010
            Y: =28
            Width: =60
            Height: =28
            Default: =ThisItem.IsActive
            OnText: ="Yes"
            OffText: ="No"
            Font: =Font.'Segoe UI'
            Size: =10

        btnSaveUser As button:
            X: =1080
            Y: =14
            Width: =80
            Height: =30
            Text: ="Save"
            Fill: =RGBA(31, 55, 100, 1)
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Size: =12
            RadiusTopLeft: =4
            RadiusTopRight: =4
            RadiusBottomLeft: =4
            RadiusBottomRight: =4
            BorderThickness: =0
            OnSelect: |
                =Patch(CRUserAdmin, ThisItem, {
                  Role: ddlEditRole.Selected.Value,
                  StakeholderGroup: ddlEditGroup.Selected.Value,
                  IsActive: togActive.Value
                });
                Notify("User updated.", NotificationType.Success)
