'Submit CR B Screen' As screen:
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          Submit CR B Screen — OnVisible
          Purpose: Part B of the CR submission form — Content, cost impact and settings.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        Set(gblFormError, "")

    conMainSCB As GroupContainer:
        Fill: =RGBA(0, 0, 0, 0)
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =Parent.Height

        conHeaderSCB As GroupContainer:
            Fill: =RGBA(0, 0, 0, 0)
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =50

            recHeaderSCB As rectangle:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Fill: =RGBA(31, 55, 100, 1)

            imgLogoSCB As image:
                X: =8
                Y: =15
                Width: =40
                Height: =20
                Image: =""
                ImagePosition: =ImagePosition.Fit

            lblHeaderSCB As label:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Text: =If(gblCRMode = "New", "Submit New Change Request — Part B: Content & Impact", "Edit Change Request — Part B: Content & Impact")
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                Size: =15
                FontWeight: =FontWeight.Semibold
                Align: =Align.Center

        conSubNavSCB As GroupContainer:
            Fill: =RGBA(0, 0, 0, 0)
            X: =0
            Y: =conHeaderSCB.Y + conHeaderSCB.Height
            Width: =Parent.Width
            Height: =45

            recSubNavSCB As rectangle:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Fill: =RGBA(24, 44, 82, 1)

            btnHomeSCB As button:
                X: =8
                Y: =4
                Width: =36
                Height: =36
                Text: ="🏠"
                Fill: =RGBA(24, 44, 82, 1)
                Color: =RGBA(255, 255, 255, 1)
                BorderThickness: =0
                Size: =16
                OnSelect: =Navigate('Home Screen', ScreenTransition.None)

            btnBackSCB As button:
                X: =48
                Y: =btnHomeSCB.Y
                Width: =80
                Height: =36
                Text: ="← Previous"
                Fill: =RGBA(24, 44, 82, 1)
                Color: =RGBA(255, 255, 255, 1)
                BorderThickness: =0
                Size: =12
                OnSelect: =Navigate('Submit CR Screen', ScreenTransition.None)

            btnSaveDraftSCB As button:
                X: =Parent.Width - 300
                Y: =btnHomeSCB.Y + 1
                Width: =130
                Height: =34
                Text: ="Save as Draft"
                Fill: =RGBA(149, 165, 166, 1)
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                Size: =13
                RadiusTopLeft: =4
                RadiusTopRight: =4
                RadiusBottomLeft: =4
                RadiusBottomRight: =4
                BorderThickness: =0
                OnSelect: |
                    =Patch(CRRequests, gblDetailCR,
                      {
                        CRDescription: txtDescSCB.Text,
                        ReasonForChange: txtReasonSCB.Text,
                        DoNothingOption: txtDoNothingSCB.Text,
                        AdditionalInformation: txtAdditionalSCB.Text,
                        RE_Delta_PerAircraft: txtRESCB.Text,
                        NRE_Delta: txtNRESCB.Text,
                        TotalCostDelta: txtTotalSCB.Text,
                        WeightDelta_PerAircraft: txtW1SCB.Text,
                        WeightDelta_AllAircraft: txtWAllSCB.Text,
                        AnnualCoWImpact: txtCoWSCB.Text,
                        CostCurrency: {Value: ddlCurrencySCB.Selected.Value},
                        IsConfidential: ddlConfidentialitySCB.Selected.Value = "Confidential",
                        IsDraft: true
                      }
                    );
                    If(IsEmpty(Errors(CRRequests)),
                      Notify("Draft saved.", NotificationType.Success),
                      Notify("Save failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
                    )

        btnSubmitSCB As button:
            X: =Parent.Width - 162
            Y: =58
            Width: =150
            Height: =34
            Text: ="Submit Formally"
            Fill: =RGBA(192, 57, 43, 1)
            Color: =RGBA(255, 255, 255, 1)
            Font: =Font.'Segoe UI'
            Size: =13
            RadiusTopLeft: =4
            RadiusTopRight: =4
            RadiusBottomLeft: =4
            RadiusBottomRight: =4
            BorderThickness: =0
            OnSelect: |
                =If(
                  IsBlank(txtDescSCB.Text),
                  Set(gblFormError, "CR Description is required before formal submission"),
                  If(CountRows(Filter(CRRequests, CRNumber = gblDetailCR.CRNumber And ID <> gblDetailCR.ID)) > 0,
                    Set(gblFormError, gblDetailCR.CRNumber & " already exists — check the CR number"),
                    Set(gblFormError, "");
                    Patch(CRRequests, gblDetailCR, {
                      CRDescription: txtDescSCB.Text,
                      ReasonForChange: txtReasonSCB.Text,
                      DoNothingOption: txtDoNothingSCB.Text,
                      AdditionalInformation: txtAdditionalSCB.Text,
                      RE_Delta_PerAircraft: txtRESCB.Text,
                      NRE_Delta: txtNRESCB.Text,
                      TotalCostDelta: txtTotalSCB.Text,
                      WeightDelta_PerAircraft: txtW1SCB.Text,
                      WeightDelta_AllAircraft: txtWAllSCB.Text,
                      AnnualCoWImpact: txtCoWSCB.Text,
                      CostCurrency: {Value: ddlCurrencySCB.Selected.Value},
                      IsConfidential: ddlConfidentialitySCB.Selected.Value = "Confidential",
                      IsDraft: false,
                      CRStatus: {Value: "Submitted"},
                      SubmittedDate: Today()
                    });
                    If(IsEmpty(Errors(CRRequests)),
                      Navigate('View CRs Screen', ScreenTransition.None);
                      Notify(gblDetailCR.CRNumber & " submitted successfully.", NotificationType.Success),
                      Set(gblFormError, "Submission failed — " & First(Errors(CRRequests)).Message)
                    )
                  )
                )

    lblErrorSCB As label:
        X: =16
        Y: =100
        Width: =Parent.Width - 32
        Height: =28
        Text: =gblFormError
        Color: =RGBA(231, 76, 60, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        Visible: =Not(IsBlank(gblFormError))

    recSectionContentSCB As rectangle:
        X: =0
        Y: =128
        Width: =Parent.Width
        Height: =28
        Fill: =RGBA(31, 55, 100, 1)

    lblSectionContentSCB As label:
        X: =16
        Y: =128
        Width: =Parent.Width
        Height: =28
        Text: ="CR CONTENT"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        FontWeight: =FontWeight.Semibold

    lblDescLblSCB As label:
        X: =16
        Y: =162
        Width: =Parent.Width - 32
        Height: =18
        Text: ="❗ CR Description *"
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Size: =12

    txtDescSCB As text:
        X: =16
        Y: =182
        Width: =Parent.Width - 32
