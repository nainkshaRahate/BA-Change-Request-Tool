scrStakeholderAssessment As screen:
    Fill: =RGBA(245, 247, 250, 1)

    rectHeaderSA As rectangle:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Fill: =RGBA(31, 55, 100, 1)

    imgLogoSA As image:
        X: =8
        Y: =5
        Width: =40
        Height: =20
        Image: =BALogo
        ImagePosition: =ImagePosition.Fit

    lblHeaderSA As label:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =50
        Text: ="Stakeholder Assessment — Part B"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =16
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    rectSubNavSA As rectangle:
        X: =0
        Y: =50
        Width: =Parent.Width
        Height: =45
        Fill: =RGBA(24, 44, 82, 1)

    btnHomeSA As button:
        X: =8
        Y: =57
        Width: =36
        Height: =36
        Text: ="🏠"
        Fill: =RGBA(24, 44, 82, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =16
        OnSelect: =Navigate(scrHome, None)

    btnBackSA As button:
        X: =50
        Y: =57
        Width: =80
        Height: =36
        Text: ="← Part A"
        Fill: =RGBA(24, 44, 82, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =12
        OnSelect: =Navigate(scrCRDetail, None)

    rectProgHeaderSA As rectangle:
        X: =0
        Y: =95
        Width: =Parent.Width
        Height: =60
        Fill: =RGBA(13, 71, 88, 1)

    lblProgLabelSA As label:
        X: =0
        Y: =95
        Width: =Parent.Width / 6
        Height: =25
        Text: ="PROGRAMME"
        Color: =RGBA(174, 214, 241, 1)
        Font: =Font.'Segoe UI'
        Size: =9
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblProgValueSA As label:
        X: =0
        Y: =120
        Width: =Parent.Width / 6
        Height: =35
        Text: =gblDetailCR.ProgrammeName
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        FontWeight: =FontWeight.Bold
        Align: =Align.Center

    lblSupplierLabelSA As label:
        X: =Parent.Width / 6
        Y: =95
        Width: =Parent.Width / 6
        Height: =25
        Text: ="SUPPLIER"
        Color: =RGBA(174, 214, 241, 1)
        Font: =Font.'Segoe UI'
        Size: =9
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblSupplierValueSA As label:
        X: =Parent.Width / 6
        Y: =120
        Width: =Parent.Width / 6
        Height: =35
        Text: =If(IsBlank(gblDetailCR.Supplier), "—", gblDetailCR.Supplier)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        Align: =Align.Center

    lblPMLabelSA As label:
        X: =Parent.Width / 3
        Y: =95
        Width: =Parent.Width / 6
        Height: =25
        Text: ="PROJECT MANAGER"
        Color: =RGBA(174, 214, 241, 1)
        Font: =Font.'Segoe UI'
        Size: =9
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblPMValueSA As label:
        X: =Parent.Width / 3
        Y: =120
        Width: =Parent.Width / 6
        Height: =35
        Text: =gblDetailCR.ProjectManager.DisplayName
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        Align: =Align.Center

    lblCRNumberLabelSA As label:
        X: =Parent.Width / 2
        Y: =95
        Width: =Parent.Width / 6
        Height: =25
        Text: ="CR NUMBER"
        Color: =RGBA(174, 214, 241, 1)
        Font: =Font.'Segoe UI'
        Size: =9
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblCRNumberValueSA As label:
        X: =Parent.Width / 2
        Y: =120
        Width: =Parent.Width / 6
        Height: =35
        Text: =gblDetailCR.CRNumber
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        FontWeight: =FontWeight.Bold
        Align: =Align.Center

    lblAIPSGLabelSA As label:
        X: =2 * Parent.Width / 3
        Y: =95
        Width: =Parent.Width / 6
        Height: =25
        Text: ="AIPSG DATE"
        Color: =RGBA(174, 214, 241, 1)
        Font: =Font.'Segoe UI'
        Size: =9
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblAIPSGValueSA As label:
        X: =2 * Parent.Width / 3
        Y: =120
        Width: =Parent.Width / 6
        Height: =35
        Text: =Text(gblDetailCR.AIPSGTargetDate, "dd mmm yyyy")
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        Align: =Align.Center

    rectPaleBlueBanner As rectangle:
        X: =0
        Y: =155
        Width: =Parent.Width
        Height: =40
        Fill: =RGBA(174, 214, 241, 0.3)
        BorderColor: =RGBA(174, 214, 241, 1)
        BorderThickness: =1
        Visible: =CountRows(Filter(CRStakeholderReviews, CRNumber.CRNumber = gblDetailCR.CRNumber, RAGStatus = "Pale Blue")) > 0

    lblPaleBlueBanner As label:
        X: =16
        Y: =155
        Width: =Parent.Width - 32
        Height: =40
        Text: |
            ="⚠  " & Text(CountRows(Filter(CRStakeholderReviews, CRNumber.CRNumber = gblDetailCR.CRNumber, RAGStatus = "Pale Blue"))) & " stakeholder group(s) still showing Pale Blue. All must be updated before this CR can go to the SG."
        Color: =RGBA(31, 55, 100, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        Visible: =CountRows(Filter(CRStakeholderReviews, CRNumber.CRNumber = gblDetailCR.CRNumber, RAGStatus = "Pale Blue")) > 0

    rectTableHeader As rectangle:
        X: =0
        Y: =195
        Width: =Parent.Width
        Height: =36
        Fill: =RGBA(31, 55, 100, 1)

    lblColStakeholder As label:
        X: =0
        Y: =195
        Width: =200
        Height: =36
        Text: ="STAKEHOLDER"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =11
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblColRAG As label:
        X: =200
        Y: =195
        Width: =100
        Height: =36
        Text: ="RAG"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =11
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblColImpact As label:
        X: =300
        Y: =195
        Width: =Parent.Width - 550
        Height: =36
        Text: ="IMPACT STATEMENT"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =11
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblColReviewer As label:
        X: =Parent.Width - 250
        Y: =195
        Width: =150
        Height: =36
        Text: ="REVIEWER"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =11
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    lblColDate As label:
        X: =Parent.Width - 100
        Y: =195
        Width: =100
        Height: =36
        Text: ="DATE"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =11
        FontWeight: =FontWeight.Semibold
        Align: =Align.Center

    galStakeholderRows As gallery:
        X: =0
        Y: =231
        Width: =Parent.Width
        Height: =Parent.Height - 311
        TemplateHeight: =80
        TemplatePadding: =0
        Items: =Filter(CRStakeholderReviews, CRNumber.CRNumber = gblDetailCR.CRNumber)

        rectRowBgSA As rectangle:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =79
            Fill: =If(IsEven(ThisItem.ID), RGBA(249, 249, 249, 1), RGBA(255, 255, 255, 1))

        lblGalStakeholderGroup As label:
            X: =8
            Y: =12
            Width: =190
            Height: =56
            Text: =ThisItem.StakeholderGroup
            Color: =RGBA(31, 55, 100, 1)
            Font: =Font.'Segoe UI'
            Size: =13
            FontWeight: =FontWeight.Bold

        galRAGDDL As dropdown:
            X: =202
            Y: =20
            Width: =94
            Height: =36
            Items: |
                =If(ThisItem.StakeholderGroup = "Other",
                  ["Pale Blue","Green","Amber","Red","Grey"],
                  ["Pale Blue","Green","Amber","Red"]
                )
            Default: =ThisItem.RAGStatus
            DisplayMode: |
                =If(gblIsPMO Or gblStakeholderGroup = ThisItem.StakeholderGroup,
                  DisplayMode.Edit,
                  DisplayMode.View
                )
            Font: =Font.'Segoe UI'
            Size: =12

        txtImpactStatement As text:
            X: =302
            Y: =8
            Width: =Parent.Width - 554
            Height: =64
            Default: =ThisItem.ImpactStatement
            Mode: =TextMode.MultiLine
            Font: =Font.'Segoe UI'
            Size: =12
            DisplayMode: |
                =If(gblIsPMO Or gblStakeholderGroup = ThisItem.StakeholderGroup,
                  DisplayMode.Edit,
                  DisplayMode.View
                )
            BorderColor: =RGBA(200, 200, 200, 1)
            BorderThickness: =1
            RadiusTopLeft: =4
            RadiusTopRight: =4
            RadiusBottomLeft: =4
            RadiusBottomRight: =4

        lblGalReviewer As label:
            X: =Parent.Width - 248
            Y: =12
            Width: =146
            Height: =56
            Text: =If(IsBlank(ThisItem.Reviewer.DisplayName), User().FullName, ThisItem.Reviewer.DisplayName)
            Color: =RGBA(33, 33, 33, 1)
            Font: =Font.'Segoe UI'
            Size: =12

        lblGalReviewDate As label:
            X: =Parent.Width - 98
            Y: =24
            Width: =94
            Height: =32
            Text: =If(IsBlank(ThisItem.ReviewDate), "—", Text(ThisItem.ReviewDate, "dd mmm yyyy"))
            Color: =RGBA(117, 117, 117, 1)
            Font: =Font.'Segoe UI'
            Size: =11

    btnSaveStakeholderReviews As button:
        X: =Parent.Width - 260
        Y: =Parent.Height - 64
        Width: =244
        Height: =44
        Text: ="Save Stakeholder Reviews"
        Fill: =RGBA(39, 174, 96, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =14
        FontWeight: =FontWeight.Semibold
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        OnSelect: |
            =ForAll(galStakeholderRows.AllItems,
              Patch(CRStakeholderReviews,
                LookUp(CRStakeholderReviews,
                  CRNumber.CRNumber = gblDetailCR.CRNumber And StakeholderGroup = ThisRecord.StakeholderGroup),
                {
                  RAGStatus: ThisRecord.galRAGDDL.Selected.Value,
                  ImpactStatement: ThisRecord.txtImpactStatement.Text,
                  Reviewer: {Claims: "i:0#.f|membership|" & User().Email, DisplayName: User().FullName},
                  ReviewDate: Today(),
                  IsComplete: Not(ThisRecord.galRAGDDL.Selected.Value = "Pale Blue") And Not(IsBlank(ThisRecord.txtImpactStatement.Text))
                }
              )
            );
            Notify("Stakeholder reviews saved.", NotificationType.Success)

    lblPMOCommentsHeader As label:
        X: =16
        Y: =Parent.Height - 120
        Width: =200
        Height: =24
        Text: ="Comments (PMO only):"
        Color: =RGBA(31, 55, 100, 1)
        Font: =Font.'Segoe UI'
        Size: =13
        FontWeight: =FontWeight.Bold
        Visible: =gblIsPMO

    txtPMONotes As text:
        X: =16
        Y: =Parent.Height - 94
        Width: =Parent.Width - 280
        Height: =74
        Default: =gblDetailCR.PMONotes
        Mode: =TextMode.MultiLine
        Font: =Font.'Segoe UI'
        Size: =12
        Visible: =gblIsPMO
        BorderColor: =RGBA(200, 200, 200, 1)
        BorderThickness: =1
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
