"'Submit CR Screen' As screen":
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          Submit CR Screen — OnVisible
          Purpose: Part A of the CR submission form — Identification fields.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        Set(gblFormError, "");
        Refresh(CRUserAdmin);
        ClearCollect(
          colAllUsers,
          Sort(
            AddColumns(
              Filter(CRUserAdmin, Not(IsBlank(Title))),
              "Value", Title,
              "UserEmail", Email
            ),
            Value,
            SortOrder.Ascending
          )
        )

    conMainSCS As groupContainer:
        Height: =Parent.Height
        Width: =Parent.Width

        conHeaderSCS As groupContainer:
            Height: =50
            Width: =Parent.Width

            recHeaderSCS As rectangle:
                Fill: =RGBA(1, 37, 84, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            recGoldAccentSCS As rectangle:
                Fill: =RGBA(186, 150, 46, 1)
                Height: =3
                Width: =Parent.Width
                X: =0
                Y: =47

            imgLogoSCS As image:
                Height: =20
                Image: =""
                ImagePosition: =ImagePosition.Fit
                Width: =40
                X: =8
                Y: =15

            lblHeaderSCS As label:
                Align: =Align.Center
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Semibold
                Height: =Parent.Height
                Size: =15
                Text: |-
                    =If(gblCRMode = "New", "Submit New Change Request — Part A: Identification", "Edit Change Request — Part A: Identification")
                Width: =Parent.Width
                X: =0
                Y: =0

        conSubNavSCS As groupContainer:
            Height: =45
            Width: =Parent.Width
            Y: =conHeaderSCS.Y + conHeaderSCS.Height

            recSubNavSCS As rectangle:
                Fill: =RGBA(0, 22, 55, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            btnHomeSCS As button:
                BorderThickness: =0
                Fill: =RGBA(0, 22, 55, 1)
                Height: =36
                OnSelect: =Navigate('Home Screen', ScreenTransition.None)
                Size: =16
                Text: ="🏠"
                Width: =36
                X: =8
                Y: =4

            btnCancelSCS As button:
                BorderThickness: =0
                Fill: =RGBA(0, 22, 55, 1)
                Height: =36
                OnSelect: =Navigate('View CRs Screen', ScreenTransition.None)
                Size: =16
                Text: ="✕"
                Width: =36
                X: =48
                Y: =btnHomeSCS.Y

            btnClearSCS As button:
                BorderThickness: =0
                Fill: =RGBA(108, 117, 125, 1)
                Font: =Font.'Segoe UI'
                Height: =34
                OnSelect: |
                    =/* Clear all form fields on Part A and reset global state. */
                    Set(gblDetailCR, Defaults(CRRequests));
                    Reset(txtCRNumSCS);
                    Reset(txtProgCodeSCS);
                    Reset(txtProgNameSCS);
                    Reset(txtTitleSCS);
                    Reset(txtSupplierSCS);
                    Reset(txtSupRefSCS);
                    Reset(ddlPMSCS);
                    Reset(ddlSponsorSCS);
                    Reset(dteAIPSGSCS);
                    Reset(dteDeadlineSCS);
                    Set(gblFormError, "");
                    Notify("Form cleared.", NotificationType.Information)
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =13
                Text: ="Clear"
                Width: =90
                X: =Parent.Width - 400
                Y: =btnHomeSCS.Y + 1

            btnSaveDraftSCS As button:
                BorderThickness: =0
                Fill: =RGBA(149, 165, 166, 1)
                Font: =Font.'Segoe UI'
                Height: =34
                OnSelect: |
                    =/* Save as Draft — CR Number is the only required field for a draft.
                       Person columns (Originator/PM/Sponsor) are intentionally omitted
                       here: malformed Person records throw silent runtime errors that
                       abort OnSelect before any Notify can fire. */
                    Set(gblFormError, "");
                    If(IsBlank(txtCRNumSCS.Text) Or txtCRNumSCS.Text = "",
                      Set(gblFormError, "CR Number is required to save a draft.");
                      Notify("CR Number is required to save a draft.", NotificationType.Warning),
                      Patch(CRRequests,
                        If(gblCRMode = "New", Defaults(CRRequests), gblDetailCR),
                        {
                          Title: Upper(txtProgCodeSCS.Text) & ": " & txtCRNumSCS.Text & " - " & Upper(txtTitleSCS.Text),
                          CRNumber: txtCRNumSCS.Text,
                          ProgrammeCode: Upper(txtProgCodeSCS.Text),
                          ProgrammeName: txtProgNameSCS.Text,
                          CRTitle: Upper(txtTitleSCS.Text),
                          Supplier: txtSupplierSCS.Text,
                          SupplierReference: txtSupRefSCS.Text,
                          AIPSGTargetDate: dteAIPSGSCS.SelectedDate,
                          SubmissionDeadline: dteDeadlineSCS.SelectedDate,
                          IsDraft: true,
                          CRStatus: {Value: "Draft"}
                        }
                      );
                      If(IsEmpty(Errors(CRRequests)),
                        Notify("Draft saved successfully.", NotificationType.Success);
                        Navigate('View CRs Screen', ScreenTransition.None),
                        Set(gblFormError, "Save failed — " & First(Errors(CRRequests)).Message);
                        Notify("Save failed: " & First(Errors(CRRequests)).Message, NotificationType.Error)
                      )
                    )
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =13
                Text: ="Save as Draft"
                Width: =130
                X: =Parent.Width - 300
                Y: =btnHomeSCS.Y + 1

            btnContinueSCS As button:
                BorderThickness: =0
                Fill: =RGBA(1, 37, 84, 1)
                Font: =Font.'Segoe UI'
                Height: =34
                OnSelect: |
                    =/* Validate required fields sequentially; each check only sets the
                       error message if no earlier check already set one.
                       Multi-branch If with chained ;+comments was fragile through
                       pack/unpack — flat sequential Ifs are stable.
                       PM/Sponsor saved in a second Patch after main Patch succeeds
                       (Person columns need separate Patch to avoid aborting the record). */
                    Set(gblFormError, "");
                    If(IsBlank(txtCRNumSCS.Text) Or txtCRNumSCS.Text = "",
                      Set(gblFormError, "CR Number is required."));
                    If(IsBlank(gblFormError) And (IsBlank(txtProgCodeSCS.Text) Or txtProgCodeSCS.Text = ""),
                      Set(gblFormError, "Programme Code is required."));
                    If(IsBlank(gblFormError) And (IsBlank(txtProgNameSCS.Text) Or txtProgNameSCS.Text = ""),
                      Set(gblFormError, "Programme Name is required."));
                    If(IsBlank(gblFormError) And (IsBlank(txtTitleSCS.Text) Or txtTitleSCS.Text = ""),
                      Set(gblFormError, "CR Title is required."));
                    If(IsBlank(gblFormError) And (IsBlank(ddlPMSCS.Selected) Or IsBlank(ddlPMSCS.Selected.Value)),
                      Set(gblFormError, "Project Manager must be selected."));
                    If(IsBlank(gblFormError) And (IsBlank(ddlSponsorSCS.Selected) Or IsBlank(ddlSponsorSCS.Selected.Value)),
                      Set(gblFormError, "CR Sponsor must be selected."));
                    If(IsBlank(gblFormError) And IsBlank(dteAIPSGSCS.SelectedDate),
                      Set(gblFormError, "AIPSG Target Date is required."));
                    If(Not(IsBlank(gblFormError)),
                      Notify(gblFormError, NotificationType.Warning),
                      Set(gblDetailCR,
                        Patch(CRRequests,
                          If(gblCRMode = "New", Defaults(CRRequests), gblDetailCR),
                          {
                            Title: Upper(txtProgCodeSCS.Text) & ": " & txtCRNumSCS.Text & " - " & Upper(txtTitleSCS.Text),
                            CRNumber: txtCRNumSCS.Text,
                            ProgrammeCode: Upper(txtProgCodeSCS.Text),
                            ProgrammeName: txtProgNameSCS.Text,
                            CRTitle: Upper(txtTitleSCS.Text),
                            Supplier: txtSupplierSCS.Text,
                            SupplierReference: txtSupRefSCS.Text,
                            AIPSGTargetDate: dteAIPSGSCS.SelectedDate,
                            SubmissionDeadline: dteDeadlineSCS.SelectedDate,
                            IsDraft: true,
                            CRStatus: {Value: "Draft"}
                          }
                        )
                      );
                      If(IsEmpty(Errors(CRRequests)),
                        Set(gblCRMode, "Edit");
                        Patch(CRRequests, gblDetailCR,
                          {
                            ProjectManager: {
                              Claims: "i:0#.f|membership|" & ddlPMSCS.Selected.UserEmail,
                              DisplayName: ddlPMSCS.Selected.Value,
                              Email: ddlPMSCS.Selected.UserEmail
                            },
                            CRSponsor: {
                              Claims: "i:0#.f|membership|" & ddlSponsorSCS.Selected.UserEmail,
                              DisplayName: ddlSponsorSCS.Selected.Value,
                              Email: ddlSponsorSCS.Selected.UserEmail
                            }
                          }
                        );
                        Navigate('Submit CR B Screen', ScreenTransition.None),
                        Set(gblFormError, "Save failed — " & First(Errors(CRRequests)).Message);
                        Notify("Save failed: " & First(Errors(CRRequests)).Message, NotificationType.Error)
                      )
                    )
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =13
                Text: ="Next →"
                Width: =150
                X: =Parent.Width - 162
                Y: =btnHomeSCS.Y + 1

    lblErrorSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Fill: =RGBA(253, 237, 237, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Semibold
        Height: =36
        PaddingLeft: =8
        Size: =12
        Text: =gblFormError
        Visible: =Not(IsBlank(gblFormError))
        Width: =Parent.Width - 32
        X: =16
        Y: =98

