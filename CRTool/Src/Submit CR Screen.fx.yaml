"'Submit CR Screen' As screen":
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          Submit CR Screen — OnVisible
          Purpose: Part A of the CR submission form — Identification fields.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        // Clear any stale validation error from a previous navigation.
        Set(gblFormError, "")

    conMainSCS As groupContainer:
        Height: =Parent.Height
        Width: =Parent.Width

        conHeaderSCS As groupContainer:
            Height: =50
            Width: =Parent.Width

            recHeaderSCS As rectangle:
                Fill: =RGBA(1, 37, 84, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            recGoldAccentSCS As rectangle:
                Fill: =RGBA(186, 150, 46, 1)
                Height: =3
                Width: =Parent.Width
                X: =0
                Y: =47

            imgLogoSCS As image:
                Height: =20
                Image: =""
                ImagePosition: =ImagePosition.Fit
                Width: =40
                X: =8
                Y: =15

            lblHeaderSCS As label:
                Align: =Align.Center
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Semibold
                Height: =Parent.Height
                Size: =15
                Text: |-
                    =If(gblCRMode = "New", "Submit New Change Request — Part A: Identification", "Edit Change Request — Part A: Identification")
                Width: =Parent.Width
                X: =0
                Y: =0

        conSubNavSCS As groupContainer:
            Height: =45
            Width: =Parent.Width
            Y: =conHeaderSCS.Y + conHeaderSCS.Height

            recSubNavSCS As rectangle:
                Fill: =RGBA(0, 22, 55, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            btnHomeSCS As button:
                BorderThickness: =0
                Fill: =RGBA(0, 22, 55, 1)
                Height: =36
                OnSelect: =Navigate('Home Screen', ScreenTransition.None)
                Size: =16
                Text: ="🏠"
                Width: =36
                X: =8
                Y: =4

            btnCancelSCS As button:
                BorderThickness: =0
                Fill: =RGBA(0, 22, 55, 1)
                Height: =36
                OnSelect: =Navigate('View CRs Screen', ScreenTransition.None)
                Size: =16
                Text: ="✕"
                Width: =36
                X: =48
                Y: =btnHomeSCS.Y

            btnSaveDraftSCS As button:
                BorderThickness: =0
                Fill: =RGBA(149, 165, 166, 1)
                Font: =Font.'Segoe UI'
                Height: =34
                OnSelect: |
                    =// Minimum validation: CR Number is needed to identify the draft.
                    If(IsBlank(txtCRNumSCS.Text),
                      Set(gblFormError, "CR Number is required to save a draft.");
                      Notify("CR Number is required to save a draft.", NotificationType.Warning),
                      Set(gblFormError, "");
                      Patch(CRRequests,
                        If(gblCRMode = "New", Defaults(CRRequests), gblDetailCR),
                        {
                          Title: Upper(txtProgCodeSCS.Text) & ": " & txtCRNumSCS.Text & " - " & Upper(txtTitleSCS.Text),
                          CRNumber: txtCRNumSCS.Text,
                          ProgrammeCode: Upper(txtProgCodeSCS.Text),
                          ProgrammeName: txtProgNameSCS.Text,
                          CRTitle: Upper(txtTitleSCS.Text),
                          Supplier: txtSupplierSCS.Text,
                          SupplierReference: txtSupRefSCS.Text,
                          AIPSGTargetDate: dteAIPSGSCS.SelectedDate,
                          SubmissionDeadline: dteDeadlineSCS.SelectedDate,
                          IsDraft: true,
                          CRStatus: {Value: "Draft"},
                          Originator: {Claims: "i:0#.f|membership|" & User().Email, DisplayName: User().FullName, Department: ""}
                        }
                      );
                      If(IsEmpty(Errors(CRRequests)),
                        Navigate('View CRs Screen', ScreenTransition.None);
                        Notify("Draft saved successfully.", NotificationType.Success),
                        Set(gblFormError, "Save failed — " & First(Errors(CRRequests)).Message);
                        Notify("Save failed: " & First(Errors(CRRequests)).Message, NotificationType.Error)
                      )
                    )
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =13
                Text: ="Save as Draft"
                Width: =130
                X: =Parent.Width - 300
                Y: =btnHomeSCS.Y + 1

            btnContinueSCS As button:
                BorderThickness: =0
                Fill: =RGBA(1, 37, 84, 1)
                Font: =Font.'Segoe UI'
                Height: =34
                OnSelect: |
                    =// Identify the first missing required field and report it clearly.
                    If(IsBlank(txtCRNumSCS.Text),
                      Set(gblFormError, "❗ CR Number is required.");
                      Notify("CR Number is required.", NotificationType.Warning),
                    IsBlank(txtProgCodeSCS.Text),
                      Set(gblFormError, "❗ Programme Code is required.");
                      Notify("Programme Code is required.", NotificationType.Warning),
                    IsBlank(txtProgNameSCS.Text),
                      Set(gblFormError, "❗ Programme Name is required.");
                      Notify("Programme Name is required.", NotificationType.Warning),
                    IsBlank(txtTitleSCS.Text),
                      Set(gblFormError, "❗ CR Title is required.");
                      Notify("CR Title is required.", NotificationType.Warning),
                    IsBlank(cmbPMSCS.Selected),
                      Set(gblFormError, "❗ Project Manager must be selected.");
                      Notify("Please select a Project Manager from the list.", NotificationType.Warning),
                    IsBlank(cmbSponsorSCS.Selected),
                      Set(gblFormError, "❗ CR Sponsor must be selected.");
                      Notify("Please select a CR Sponsor from the list.", NotificationType.Warning),
                    IsBlank(dteAIPSGSCS.SelectedDate),
                      Set(gblFormError, "❗ AIPSG Target Date is required.");
                      Notify("AIPSG Target Date is required.", NotificationType.Warning),
                    // All fields valid — save Part A and advance to Part B.
                    Set(gblFormError, "");
                    Set(gblDetailCR,
                      Patch(CRRequests,
                        If(gblCRMode = "New", Defaults(CRRequests), gblDetailCR),
                        {
                          Title: Upper(txtProgCodeSCS.Text) & ": " & txtCRNumSCS.Text & " - " & Upper(txtTitleSCS.Text),
                          CRNumber: txtCRNumSCS.Text,
                          ProgrammeCode: Upper(txtProgCodeSCS.Text),
                          ProgrammeName: txtProgNameSCS.Text,
                          CRTitle: Upper(txtTitleSCS.Text),
                          Supplier: txtSupplierSCS.Text,
                          SupplierReference: txtSupRefSCS.Text,
                          ProjectManager: {Claims: "i:0#.f|membership|" & cmbPMSCS.Selected.Email, DisplayName: cmbPMSCS.Selected.Title, Department: ""},
                          CRSponsor: {Claims: "i:0#.f|membership|" & cmbSponsorSCS.Selected.Email, DisplayName: cmbSponsorSCS.Selected.Title, Department: ""},
                          AIPSGTargetDate: dteAIPSGSCS.SelectedDate,
                          SubmissionDeadline: dteDeadlineSCS.SelectedDate,
                          IsDraft: true,
                          CRStatus: {Value: "Draft"},
                          Originator: {Claims: "i:0#.f|membership|" & User().Email, DisplayName: User().FullName, Department: ""}
                        }
                      )
                    );
                    If(IsEmpty(Errors(CRRequests)),
                      Set(gblCRMode, "Edit");
                      Navigate('Submit CR B Screen', ScreenTransition.None),
                      Set(gblFormError, "Save failed — " & First(Errors(CRRequests)).Message);
                      Notify("Save failed: " & First(Errors(CRRequests)).Message, NotificationType.Error)
                    )
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =13
                Text: ="Next →"
                Width: =150
                X: =Parent.Width - 162
                Y: =btnHomeSCS.Y + 1

    lblErrorSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Fill: =RGBA(253, 237, 237, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Semibold
        Height: =36
        PaddingLeft: =8
        Size: =12
        Text: =gblFormError
        Visible: =Not(IsBlank(gblFormError))
        Width: =Parent.Width - 32
        X: =16
        Y: =98

    recSectionIdSCS As rectangle:
        Fill: =RGBA(1, 37, 84, 1)
        Height: =28
        Width: =Parent.Width
        X: =0
        Y: =128

    lblSectionIdSCS As label:
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Semibold
        Height: =28
        Size: =12
        Text: ="IDENTIFICATION"
        Width: =Parent.Width
        X: =16
        Y: =128

    lblCRNumLblSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ CR Number *"
        Width: =400
        X: =16
        Y: =164

    txtCRNumSCS As text:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        Default: =gblDetailCR.CRNumber
        Font: =Font.'Segoe UI'
        Height: =36
        HintText: ="e.g. CR05 or CR123"
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =400
        X: =16
        Y: =184

    lblProgCodeLblSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ Programme Code *"
        Width: =640
        X: =16
        Y: =232

    txtProgCodeSCS As text:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        Default: =gblDetailCR.ProgrammeCode
        Font: =Font.'Segoe UI'
        Height: =36
        HintText: ="e.g. A380, A32X"
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =640
        X: =16
        Y: =252

    lblProgNameLblSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ Programme Name *"
        Width: =Parent.Width - 716
        X: =700
        Y: =232

    txtProgNameSCS As text:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        Default: =gblDetailCR.ProgrammeName
        Font: =Font.'Segoe UI'
        Height: =36
        HintText: ="e.g. A380 Horizon"
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =Parent.Width - 716
        X: =700
        Y: =252

    lblTitleLblSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ CR Title *"
        Width: =Parent.Width - 32
        X: =16
        Y: =300

    txtTitleSCS As text:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        Default: =gblDetailCR.CRTitle
        Font: =Font.'Segoe UI'
        Height: =36
        HintText: ="Descriptive title (will be uppercased)"
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =Parent.Width - 32
        X: =16
        Y: =320

    lblSupplierLblSCS As label:
        Color: =RGBA(33, 33, 33, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="Supplier"
        Width: =640
        X: =16
        Y: =368

    txtSupplierSCS As text:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        Default: =gblDetailCR.Supplier
        Font: =Font.'Segoe UI'
        Height: =36
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =640
        X: =16
        Y: =388

    lblSupRefLblSCS As label:
        Color: =RGBA(33, 33, 33, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="Supplier Reference"
        Width: =Parent.Width - 716
        X: =700
        Y: =368

    txtSupRefSCS As text:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        Default: =gblDetailCR.SupplierReference
        Font: =Font.'Segoe UI'
        Height: =36
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =Parent.Width - 716
        X: =700
        Y: =388

    lblPMLblSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ Project Manager *"
        Width: =640
        X: =16
        Y: =436

    cmbPMSCS As combobox:
        BorderColor: =RGBA(180, 196, 218, 1)
        DefaultSelectedItems: =Filter(CRUserAdmin, Email = gblDetailCR.ProjectManager.Email)
        Font: =Font.'Segoe UI'
        Height: =36
        Items: =CRUserAdmin
        SearchField: ="Title"
        Width: =640
        X: =16
        Y: =456

    lblSponsorLblSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ CR Sponsor *"
        Width: =Parent.Width - 716
        X: =700
        Y: =436

    cmbSponsorSCS As combobox:
        BorderColor: =RGBA(180, 196, 218, 1)
        DefaultSelectedItems: =Filter(CRUserAdmin, Email = gblDetailCR.CRSponsor.Email)
        Font: =Font.'Segoe UI'
        Height: =36
        Items: =CRUserAdmin
        SearchField: ="Title"
        Width: =Parent.Width - 716
        X: =700
        Y: =456

    lblAIPSGLblSCS As label:
        Color: =RGBA(192, 57, 43, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ AIPSG Target Date *"
        Width: =640
        X: =16
        Y: =504

    dteAIPSGSCS As datepicker:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        DefaultDate: =gblDetailCR.AIPSGTargetDate
        Font: =Font.'Segoe UI'
        Format: =DateTimeFormat.ShortDate
        Height: =36
        Size: =13
        Width: =640
        X: =16
        Y: =524

    lblSubDeadlineLblSCS As label:
        Color: =RGBA(33, 33, 33, 1)
        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="Submission Deadline"
        Width: =Parent.Width - 716
        X: =700
        Y: =504

    dteDeadlineSCS As datepicker:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
        DefaultDate: =gblDetailCR.SubmissionDeadline
        Font: =Font.'Segoe UI'
        Format: =DateTimeFormat.ShortDate
        Height: =36
        Size: =13
        Width: =Parent.Width - 716
        X: =700
        Y: =524

