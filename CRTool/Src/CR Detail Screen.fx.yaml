'CR Detail Screen' As screen:
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          CR Detail Screen — OnVisible
          Purpose: Display read-only CR detail and PMO workflow action buttons.
                   Re-fetches the CR record to reflect any status changes made elsewhere.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        // Refresh gblDetailCR so status pills are always current.
        If(Not(IsBlank(gblDetailCR)),
          Set(gblDetailCR, LookUp(CRRequests, ID = gblDetailCR.ID))
        )

    conMainCDS As container:
        X: =0
        Y: =0
        Width: =Parent.Width
        Height: =Parent.Height

        conHeaderCDS As container:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =50

            recHeaderCDS As rectangle:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Fill: =RGBA(31, 55, 100, 1)

            imgLogoCDS As image:
                X: =8
                Y: =15
                Width: =40
                Height: =20
                Image: =""
                ImagePosition: =ImagePosition.Fit

            lblHeaderCDS As label:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Text: ="CR Detail"
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                Size: =16
                FontWeight: =FontWeight.Semibold
                Align: =Align.Center

        conSubNavCDS As container:
            X: =0
            Y: =conHeaderCDS.Y + conHeaderCDS.Height
            Width: =Parent.Width
            Height: =45

            recSubNavCDS As rectangle:
                X: =0
                Y: =0
                Width: =Parent.Width
                Height: =Parent.Height
                Fill: =RGBA(24, 44, 82, 1)

            btnHomeCDS As button:
                X: =8
                Y: =4
                Width: =36
                Height: =36
                Text: ="🏠"
                Fill: =RGBA(24, 44, 82, 1)
                Color: =RGBA(255, 255, 255, 1)
                BorderThickness: =0
                Size: =16
                OnSelect: =Navigate('Home Screen', None)

            btnBackCDS As button:
                X: =48
                Y: =btnHomeCDS.Y
                Width: =60
                Height: =36
                Text: ="← Back"
                Fill: =RGBA(24, 44, 82, 1)
                Color: =RGBA(255, 255, 255, 1)
                BorderThickness: =0
                Size: =12
                OnSelect: =Navigate('View CRs Screen', None)

            btnPartBCDS As button:
                X: =Parent.Width - 390
                Y: =btnHomeCDS.Y + 1
                Width: =100
                Height: =34
                Text: ="Part B →"
                Fill: =RGBA(31, 55, 100, 1)
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                Size: =12
                RadiusTopLeft: =4
                RadiusTopRight: =4
                RadiusBottomLeft: =4
                RadiusBottomRight: =4
                BorderThickness: =0
                OnSelect: =Navigate('Stakeholder Assessment Screen', None)

            recStatusPillCDS As rectangle:
                X: =Parent.Width - 280
                Y: =btnHomeCDS.Y + 4
                Width: =90
                Height: =28
                RadiusTopLeft: =4
                RadiusTopRight: =4
                RadiusBottomLeft: =4
                RadiusBottomRight: =4
                Fill: |
                    =Switch(gblDetailCR.CRStatus.Value,
                      "Draft", RGBA(149,165,166,1),
                      "Submitted", RGBA(110,140,176,1),
                      "PMO Review", RGBA(31,55,100,1),
                      "In Assessment", RGBA(243,156,18,1),
                      "PMO Consolidation", RGBA(243,156,18,1),
                      "Programme Meeting", RGBA(31,55,100,1),
                      "Pre-SG Distribution", RGBA(31,55,100,1),
                      "SG Review", RGBA(31,55,100,1),
                      "Post-Meeting Edits", RGBA(243,156,18,1),
                      "Approved", RGBA(39,174,96,1),
                      "Deferred", RGBA(149,165,166,1),
                      "Rejected", RGBA(192,57,43,1),
                      "Closed", RGBA(149,165,166,1),
                      RGBA(31,55,100,1)
                    )

    lblStatusPillCDS As label:
        X: =Parent.Width - 280
        Y: =61
        Width: =90
        Height: =28
        Text: =gblDetailCR.CRStatus.Value
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =10
        Align: =Align.Center
        FontWeight: =FontWeight.Semibold

    recDaysOpenCDS As rectangle:
        X: =Parent.Width - 182
        Y: =61
        Width: =70
        Height: =28
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        Fill: =RGBA(39, 174, 96, 1)

    lblDaysOpenCDS As label:
        X: =Parent.Width - 182
        Y: =61
        Width: =70
        Height: =28
        Text: =Text(DateDiff(gblDetailCR.SubmittedDate, Today(), Days)) & " Days"
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =11
        Align: =Align.Center

    btnDeleteCDS As button:
        X: =Parent.Width - 104
        Y: =61
        Width: =36
        Height: =28
        Text: ="🗑"
        Fill: =RGBA(192, 57, 43, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderThickness: =0
        Size: =14
        Visible: =gblIsAdmin
        OnSelect: |
            =If(Confirm("Delete this CR? This cannot be undone."),
              Remove(CRRequests, gblDetailCR);
              Navigate('View CRs Screen', None);
              Notify("CR deleted.", NotificationType.Warning)
            )

    btnAcceptCDS As button:
        X: =Parent.Width - 340
        Y: =58
        Width: =150
        Height: =34
        Text: ="✓ Accept & Distribute"
        Fill: =RGBA(39, 174, 96, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "PMO Review"
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "In Assessment"}});
            If(IsEmpty(Errors(CRRequests)),
              Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
              Notify(gblDetailCR.CRNumber & " accepted and distributed for assessment.", NotificationType.Success),
              Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
            )

    btnReturnCDS As button:
        X: =Parent.Width - 490
        Y: =58
        Width: =140
        Height: =34
        Text: ="↩ Return to Owner"
        Fill: =RGBA(149, 165, 166, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "PMO Review"
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "Submitted"}});
            If(IsEmpty(Errors(CRRequests)),
              Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
              Notify(gblDetailCR.CRNumber & " returned to owner.", NotificationType.Warning),
              Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
            )

    btnReadySGCDS As button:
        X: =Parent.Width - 490
        Y: =58
        Width: =150
        Height: =34
        Text: ="Mark Ready for SG"
        Fill: =RGBA(31, 55, 100, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "PMO Consolidation"
        OnSelect: |
            =If(CountRows(Filter(CRStakeholderReviews,
                CRNumber.CRNumber = gblDetailCR.CRNumber, RAGStatus.Value = "Pale Blue")) > 0,
              Notify("Cannot proceed — " &
                Text(CountRows(Filter(CRStakeholderReviews, CRNumber.CRNumber = gblDetailCR.CRNumber, RAGStatus.Value = "Pale Blue"))) &
                " stakeholder group(s) are still Pale Blue. All assessments must be complete before SG distribution.",
                NotificationType.Error),
              Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "Pre-SG Distribution"}});
              If(IsEmpty(Errors(CRRequests)),
                Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
                Notify("CR marked ready for Pre-SG Distribution.", NotificationType.Success),
                Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
              )
            )

    btnSGDecisionCDS As button:
        X: =Parent.Width - 400
        Y: =58
        Width: =160
        Height: =34
        Text: ="Record SG Decision"
        Fill: =RGBA(243, 156, 18, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "SG Review"
        OnSelect: =Notify("Use the SG Decision panel below to record the outcome.", NotificationType.Information)

    btnCloseCDS As button:
        X: =Parent.Width - 340
        Y: =58
        Width: =100
        Height: =34
        Text: ="Close CR"
        Fill: =RGBA(149, 165, 166, 1)
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Size: =12
        RadiusTopLeft: =4
        RadiusTopRight: =4
        RadiusBottomLeft: =4
        RadiusBottomRight: =4
        BorderThickness: =0
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "Approved"
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "Closed"}, ClosedDate: Today()});
            If(IsEmpty(Errors(CRRequests)),
              Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
              Notify(gblDetailCR.CRNumber & " closed.", NotificationType.Success),
              Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
            )

