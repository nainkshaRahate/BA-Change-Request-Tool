"'CR Detail Screen' As screen":
    Fill: =RGBA(245, 247, 250, 1)
    OnVisible: |
        =/*
          CR Detail Screen — OnVisible
          Purpose: Display read-only CR detail and PMO workflow action buttons.
                   Re-fetches the CR record to reflect any status changes made elsewhere.
          Author:  IAG Tech Developer
          Date:    07 Apr 2026
        */
        // Refresh gblDetailCR so status pills are always current.
        If(Not(IsBlank(gblDetailCR)),
          Set(gblDetailCR, LookUp(CRRequests, ID = gblDetailCR.ID))
        )

    conMainCDS As groupContainer:
        Height: =Parent.Height
        Width: =Parent.Width

        conHeaderCDS As groupContainer:
            Height: =50
            Width: =Parent.Width

            recHeaderCDS As rectangle:
                Fill: =RGBA(1, 37, 84, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            recGoldAccentCDS As rectangle:
                Fill: =RGBA(186, 150, 46, 1)
                Height: =3
                Width: =Parent.Width
                X: =0
                Y: =47

            imgLogoCDS As image:
                Height: =20
                Image: =""
                ImagePosition: =ImagePosition.Fit
                Width: =40
                X: =8
                Y: =15

            lblHeaderCDS As label:
                Align: =Align.Center
                Color: =RGBA(255, 255, 255, 1)
                Font: =Font.'Segoe UI'
                FontWeight: =FontWeight.Semibold
                Height: =Parent.Height
                Size: =16
                Text: ="CR Detail"
                Width: =Parent.Width
                X: =0
                Y: =0

        conSubNavCDS As groupContainer:
            Height: =45
            Width: =Parent.Width
            Y: =conHeaderCDS.Y + conHeaderCDS.Height

            recSubNavCDS As rectangle:
                Fill: =RGBA(0, 22, 55, 1)
                Height: =Parent.Height
                Width: =Parent.Width
                X: =0
                Y: =0

            btnHomeCDS As button:
                BorderThickness: =0
                Fill: =RGBA(0, 22, 55, 1)
                Height: =36
                OnSelect: =Navigate('Home Screen', ScreenTransition.None)
                Size: =16
                Text: ="🏠"
                Width: =36
                X: =8
                Y: =4

            btnBackCDS As button:
                BorderThickness: =0
                Fill: =RGBA(0, 22, 55, 1)
                Height: =36
                OnSelect: =Navigate('View CRs Screen', ScreenTransition.None)
                Size: =12
                Text: ="← Back"
                Width: =60
                X: =48
                Y: =btnHomeCDS.Y

            btnEditCDS As button:
                BorderThickness: =0
                Color: =RGBA(255, 255, 255, 1)
                Fill: =RGBA(186, 150, 46, 1)
                Font: =Font.'Segoe UI'
                Height: =34
                OnSelect: |
                    =Set(gblCRMode, "Edit");
                    Navigate('Submit CR Screen', ScreenTransition.None)
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =12
                Text: ="✎ Edit Draft"
                Visible: =gblDetailCR.CRStatus.Value = "Draft" And (gblDetailCR.Originator.Email = User().Email Or gblIsPMO Or gblIsAdmin) /* Only owners/PMO/Admins see Edit, and only while the CR is still a Draft. */
                Width: =90
                X: =112
                Y: =btnHomeCDS.Y + 1

            btnPartBCDS As button:
                BorderThickness: =0
                Fill: =RGBA(1, 37, 84, 1)
                Font: =Font.'Segoe UI'
                Height: =34
                OnSelect: =Navigate('Stakeholder Assessment Screen', ScreenTransition.None)
                RadiusBottomLeft: =6
                RadiusBottomRight: =6
                RadiusTopLeft: =6
                RadiusTopRight: =6
                Size: =12
                Text: ="Part B →"
                Width: =100
                X: =Parent.Width - 390
                Y: =btnHomeCDS.Y + 1

    recStatusPillCDS As rectangle:
        Fill: |
            =Switch(gblDetailCR.CRStatus.Value,
              "Draft", RGBA(149,165,166,1),
              "Submitted", RGBA(110,140,176,1),
              "PMO Review", RGBA(31,55,100,1),
              "In Assessment", RGBA(243,156,18,1),
              "PMO Consolidation", RGBA(243,156,18,1),
              "Programme Meeting", RGBA(31,55,100,1),
              "Pre-SG Distribution", RGBA(31,55,100,1),
              "SG Review", RGBA(31,55,100,1),
              "Post-Meeting Edits", RGBA(243,156,18,1),
              "Approved", RGBA(39,174,96,1),
              "Deferred", RGBA(149,165,166,1),
              "Rejected", RGBA(192,57,43,1),
              "Closed", RGBA(149,165,166,1),
              RGBA(31,55,100,1)
            )
        Height: =28
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =90
        X: =Parent.Width - 280
        Y: =95

    lblStatusPillCDS As label:
        Align: =Align.Center
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        FontWeight: =FontWeight.Semibold
        Height: =28
        Size: =10
        Text: =gblDetailCR.CRStatus.Value
        Width: =90
        X: =Parent.Width - 280
        Y: =95

    recDaysOpenCDS As rectangle:
        Fill: =RGBA(39, 174, 96, 1)
        Height: =28
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Width: =70
        X: =Parent.Width - 182
        Y: =95

    lblDaysOpenCDS As label:
        Align: =Align.Center
        Color: =RGBA(255, 255, 255, 1)
        Font: =Font.'Segoe UI'
        Height: =28
        Size: =11
        Text: =Text(DateDiff(gblDetailCR.SubmittedDate, Today(), TimeUnit.Days)) & " Days"
        Width: =70
        X: =Parent.Width - 182
        Y: =95

    btnDeleteCDS As button:
        BorderThickness: =0
        Fill: =RGBA(192, 57, 43, 1)
        Height: =28
        OnSelect: |
            =If(Confirm("Delete this CR? This cannot be undone."),
              Remove(CRRequests, gblDetailCR);
              Navigate('View CRs Screen', ScreenTransition.None);
              Notify("CR deleted.", NotificationType.Warning)
            )
        Size: =14
        Text: ="🗑"
        Visible: =gblIsAdmin
        Width: =36
        X: =Parent.Width - 104
        Y: =95

    btnAcceptCDS As button:
        BorderThickness: =0
        Fill: =RGBA(39, 174, 96, 1)
        Font: =Font.'Segoe UI'
        Height: =34
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "In Assessment"}});
            If(IsEmpty(Errors(CRRequests)),
              Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
              Notify(gblDetailCR.CRNumber & " accepted and distributed for assessment.", NotificationType.Success),
              Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
            )
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Size: =12
        Text: ="✓ Accept & Distribute"
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "PMO Review"
        Width: =150
        X: =Parent.Width - 340
        Y: =92

    btnReturnCDS As button:
        BorderThickness: =0
        Fill: =RGBA(149, 165, 166, 1)
        Font: =Font.'Segoe UI'
        Height: =34
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "Submitted"}});
            If(IsEmpty(Errors(CRRequests)),
              Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
              Notify(gblDetailCR.CRNumber & " returned to owner.", NotificationType.Warning),
              Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
            )
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Size: =12
        Text: ="↩ Return to Owner"
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "PMO Review"
        Width: =140
        X: =Parent.Width - 490
        Y: =92

    btnReadySGCDS As button:
        BorderThickness: =0
        Fill: =RGBA(1, 37, 84, 1)
        Font: =Font.'Segoe UI'
        Height: =34
        OnSelect: |
            =If(CountRows(Filter(CRStakeholderReviews,
                CRNumber = gblDetailCR.CRNumber, RAGStatus.Value = "Pale Blue")) > 0,
              Notify("Cannot proceed — " &
                Text(CountRows(Filter(CRStakeholderReviews, CRNumber = gblDetailCR.CRNumber, RAGStatus.Value = "Pale Blue"))) &
                " stakeholder group(s) are still Pale Blue. All assessments must be complete before SG distribution.",
                NotificationType.Error),
              Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "Pre-SG Distribution"}});
              If(IsEmpty(Errors(CRRequests)),
                Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
                Notify("CR marked ready for Pre-SG Distribution.", NotificationType.Success),
                Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
              )
            )
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Size: =12
        Text: ="Mark Ready for SG"
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "PMO Consolidation"
        Width: =150
        X: =Parent.Width - 490
        Y: =92

    btnSGDecisionCDS As button:
        BorderThickness: =0
        Fill: =RGBA(243, 156, 18, 1)
        Font: =Font.'Segoe UI'
        Height: =34
        OnSelect: =Notify("Use the SG Decision panel below to record the outcome.", NotificationType.Information)
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Size: =12
        Text: ="Record SG Decision"
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "SG Review"
        Width: =160
        X: =Parent.Width - 400
        Y: =92

    btnCloseCDS As button:
        BorderThickness: =0
        Fill: =RGBA(149, 165, 166, 1)
        Font: =Font.'Segoe UI'
        Height: =34
        OnSelect: |
            =Patch(CRRequests, gblDetailCR, {CRStatus: {Value: "Closed"}, ClosedDate: Today()});
            If(IsEmpty(Errors(CRRequests)),
              Set(gblDetailCR, LookUp(CRRequests, CRNumber = gblDetailCR.CRNumber));
              Notify(gblDetailCR.CRNumber & " closed.", NotificationType.Success),
              Notify("Action failed — " & First(Errors(CRRequests)).Message, NotificationType.Error)
            )
        RadiusBottomLeft: =6
        RadiusBottomRight: =6
        RadiusTopLeft: =6
        RadiusTopRight: =6
        Size: =12
        Text: ="Close CR"
        Visible: =gblIsPMO And gblDetailCR.CRStatus.Value = "Approved"
        Width: =100
        X: =Parent.Width - 340
        Y: =92

