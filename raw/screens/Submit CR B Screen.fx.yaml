        Font: =Font.'Segoe UI'
        Height: =18
        Size: =12
        Text: ="❗ CR Description *"
        Width: =Parent.Width - 32
        X: =16
        Y: =162

    txtDescSCB As text:
        BorderColor: =RGBA(180, 196, 218, 1)
        BorderThickness: =1
